# Default base value for any item, that doesn't have any valuable tags.
defaultBaseItemValue: 0.33
# Difficulty threshold for spawning locks. Locks with difficulty below this value will not spawn.
difficultyThreshold: 0.0
# Disables rendering of locks for players.
disableLockRendering: true
# Multiplies every difficulty by this value before clamping, simple as that.
globalDifficultyMultiplier: 1.15
# Linearly maps calculated item values within this range to a 0% – 100% difficulty scale.
itemValueRange:
    max: 224.0
    min: 0.0
# Multiplies the difficulty for the loot table by the value provided below (before clamping).
lootTableMultiplier:
    minecraft:chests/spawn_bonus_chest: 0.85
    minecraft:chests/village/village_armorer: 0.95
    minecraft:chests/village/village_butcher: 0.95
    minecraft:chests/village/village_cartographer: 0.95
    minecraft:chests/village/village_desert_house: 0.95
    minecraft:chests/village/village_fisher: 0.95
    minecraft:chests/village/village_fletcher: 0.95
    minecraft:chests/village/village_mason: 0.95
    minecraft:chests/village/village_plains_house: 0.95
    minecraft:chests/village/village_savanna_house: 0.95
    minecraft:chests/village/village_shepherd: 0.95
    minecraft:chests/village/village_snowy_house: 0.95
    minecraft:chests/village/village_taiga_house: 0.95
    minecraft:chests/village/village_tannery: 0.95
    minecraft:chests/village/village_temple: 1.0
    minecraft:chests/village/village_toolsmith: 1.0
    minecraft:chests/village/village_weaponsmith: 1.05
    minecraft:chests/shipwreck_supply: 1.0
    minecraft:chests/shipwreck_map: 1.05
    minecraft:chests/shipwreck_treasure: 1.15
    minecraft:chests/underwater_ruin_small: 1.0
    minecraft:chests/underwater_ruin_big: 1.1
    minecraft:chests/pillager_outpost: 1.2
    minecraft:chests/igloo_chest: 1.05
    minecraft:chests/abandoned_mineshaft: 1.15
    minecraft:chests/simple_dungeon: 1.2
    minecraft:chests/trial_chambers/corridor_barrel: 1.2
    minecraft:chests/trial_chambers/intersection_barrel: 1.25
    minecraft:chests/trial_chambers/entrance_barrel: 1.15
    minecraft:chests/buried_treasure: 1.3
    minecraft:chests/desert_pyramid: 1.35
    minecraft:chests/jungle_temple: 1.35
    minecraft:chests/jungle_temple_dispenser: 1.25
    minecraft:chests/nether_bridge: 1.6
    minecraft:chests/ruined_portal: 1.35
    minecraft:chests/stronghold_corridor: 1.65
    minecraft:chests/stronghold_crossing: 1.65
    minecraft:chests/stronghold_library: 1.75
    minecraft:chests/woodland_mansion: 1.9
    minecraft:chests/bastion_bridge: 1.8
    minecraft:chests/bastion_hoglin_stable: 1.8
    minecraft:chests/bastion_other: 1.9
    minecraft:chests/bastion_treasure: 2.15
    minecraft:chests/ancient_city: 2.25
    minecraft:chests/end_city_treasure: 2.25
# Minigame type by dimension.
minigameType:
    minecraft:overworld: clavis:gear
    minecraft:the_end: clavis:mirror
# Additional value multipliers. Added on top of item value
modifiers:
    # Added to the total multiplier if the item is equippable in curios or trinkets.
    isCuriosOrTrinkets: 8.0
    # Added to the total multiplier if the item's max stack size is less than 16.
    lowStackSize: 1.25
    # Added to the total multiplier per an enchantment level.
    perEnchantmentLevel: 0.25
    # Added to the total multiplier if the item is of one of specified rarities.
    rarity:
        UNCOMMON: 1.25
        RARE: 1.5
        EPIC: 2.0
# Penalty for losing HP.
qualityPenaltyPerHit: 0.25
# Starting quality of a minigame.
startingQuality: # 0.0 - 10.0
    1.35
# Determines whether losing the minigame unlocks the lock.
unlocksAfterLosing: false
# Clamps the difficulty to this value.
upperDifficultyClamp: 1.5
# A collection of valuable items and tags and its values. If an item isn't in the list and doesn't have any of these tags, it will use the base item value above. Item IDs are prioritized over tags.
valuableItems:
    minecraft:saddle: 1.25
    minecraft:name_tag: 1.0
    '#c:ingots': 5.0
    '#c:gems': 8.0
    '#c:storage_blocks': 16.0
    '#c:ores': 4.0
    '#c:raw_materials': 4.0
    '#c:rods': 6.0
    '#c:alloys': 6.0
    '#c:circuits': 8.0
    '#c:dusts': 1.0
    '#c:foods/golden': 16.0
    '#c:tools': 2.0
    '#c:armors': 2.0
    '#c:music_discs': 8.0
