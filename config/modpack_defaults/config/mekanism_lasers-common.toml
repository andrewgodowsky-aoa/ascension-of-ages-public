	# Range: > 0
	oreGeneratorCooldown = 4
	#[Depreciated] Energy cost of fabricating ore/ores
	# Default: 16000000
	# Range: 0 ~ 9223372036854775807
	oreGeneratorFabricationCost = 16000000
	#[Depreciated] How much ores do you get from one cycle
